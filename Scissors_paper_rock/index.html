<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scissors_paper_rock Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Scissors Paper Rock Game</h1>
    <div class="choices">
        <div class="choice" id="rock">
            <img src="photos/rock.webp" alt="" srcset="">
        </div>
        <div class="choice" id="paper">
            <img src="photos/paper.png" alt="" srcset="">
        </div>
        <div class="choice" id="scissor">
            <img src="photos/scissor.jpg" alt="" srcset="">
        </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>

    <div class="msg-container">
        <p id="msg">Play your game</p>
    </div>
    


    <script src="script.js"></script>
</body>
</html>
